services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: keyhub
      POSTGRES_PASSWORD: keyhub
      POSTGRES_DB: keyhub
    ports:
      - "6789:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keyhub"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
